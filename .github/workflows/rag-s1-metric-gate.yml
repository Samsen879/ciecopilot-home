name: RAG S1 Metric Gate

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "api/rag/**"
      - "scripts/rag/**"
      - "data/eval/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rag-s1-metrics:
    name: S1 Metric Gate (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VECTOR_EMBEDDING_API_KEY: ${{ secrets.VECTOR_EMBEDDING_API_KEY }}
      VECTOR_EMBEDDING_BASE_URL: ${{ secrets.VECTOR_EMBEDDING_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
      VECTOR_EMBEDDING_MODEL: ${{ secrets.VECTOR_EMBEDDING_MODEL || 'text-embedding-v4' }}
      VECTOR_EMBEDDING_DIMENSIONS: ${{ secrets.VECTOR_EMBEDDING_DIMENSIONS }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      CHAT_MODEL: ${{ secrets.CHAT_MODEL || 'qwen-plus' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine execution scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}"
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          {
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$changed_files" | grep -Eq '^(api/rag/|api/learning/|src/|scripts/rag/|data/eval/)'; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=noop" >> "$GITHUB_OUTPUT"
          fi

      - name: No-op for AO-only PR scope
        if: steps.scope.outputs.mode == 'noop'
        run: |
          echo "AO-only PR detected; S1 Metric Gate is not applicable to this diff."
          printf '%s\n' "${{ steps.scope.outputs.changed_files }}"

      - name: Setup Node
        if: steps.scope.outputs.mode == 'full'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.scope.outputs.mode == 'full'
        run: npm ci

      - name: Run S1 metric gate (required)
        if: steps.scope.outputs.mode == 'full'
        run: node scripts/rag/run_s1_metric_gate.js

      - name: Upload metric artifacts
        if: always() && steps.scope.outputs.mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: rag-s1-metric-artifacts
          path: |
            data/eval/rag_live_set_v1.json
            data/eval/rag_live_set_v1_manifest.json
            runs/backend/rag_live_benchmark_latest.json
            runs/backend/rag_live_benchmark_round1.json
            runs/backend/rag_live_benchmark_round2.json
            runs/backend/rag_live_benchmark_stability.json
            runs/backend/rag_s1_metric_gate_summary.json
            docs/reports/rag_live_benchmark_latest.md
            docs/reports/rag_live_benchmark_round1.md
            docs/reports/rag_live_benchmark_round2.md
          if-no-files-found: ignore
