port: 3310
terminalPort: 14810
directTerminalPort: 14811
readyThresholdMs: 300000

defaults:
  runtime: tmux
  agent: codex
  workspace: worktree
  notifiers: [desktop]
  orchestrator:
    agent: codex
  worker:
    agent: codex

projects:
  ciecopilot-home:
    name: CIE Copilot Home
    repo: Samsen879/ciecopilot-home
    path: /home/samsen/code/ciecopilot-home
    defaultBranch: main
    sessionPrefix: cie
    symlinks:
      - .env
    agentRulesFile: .agent-rules.md
    orchestratorRules: |
      Use the following matrices as the authoritative phase-2 operator contract. Prefer matrix row references over re-deriving flow from free-form prompt text.

      AO_PHASE2_CHAIN_MATRIX
      C0 live_github_canonical = treat live GitHub PR, CI, and review state as canonical whenever AO lifecycle metadata disagrees with GitHub
      C1 stale_state_preflight = ao status -p ciecopilot-home --json | gh pr checks | gh pr view --json mergeable,reviewDecision,isDraft,url | ao review-check ciecopilot-home --dry-run
      C2 known_pr_trigger_entry = node scripts/ao-lifecycle.js --pr <number> --trigger <trigger> --json --strict
      C3 chain_fields = decision_chain.contract_status | decision_chain.blocking_reasons | decision_chain.next_actions | decision_chain.next_commands
      C4 truth_drilldown = node scripts/ao-reconcile.js --pr <number> --json --strict
      C5 diagnose_drilldown = node scripts/ao-doctor.js --pr <number> | node scripts/ao-doctor.js
      C6 doctor_authority = diagnose_only; not reconciliation truth, release authority, or repair authority
      C7 lifecycle_authority = decide_only; not worker restoration executor, handoff executor, or merge executor
      C8 project_reconcile_scope = inspection_only; not the authoritative phase-1 release gate
      C9 worker_continuity = keep the current worker alive after PR creation while the PR remains open
      C10 ownership_preference = prefer reconciling or continuing the existing worker when PR ownership is still clear
      C11 explicit_review_gate = once repo-local ao-review state exists for a task, require review_passed for the current target SHA before human-ready advancement; otherwise surface hold_review or human_gate

      AO_WORKFLOW_MATRIX
      W0 session_recreate = if repository branch, agent-orchestrator.yaml, or .agent-rules.md changed, or AO stash content was restored, recreate the orchestrator session
      W1 script_presence = do not instruct agents to run repo-local AO control-plane scripts unless those scripts exist in the current branch
      W2 baseline_sync = when repo-local workflow scripts exist, run npm run workflow:baseline:sync before new implementation work
      W3 worker_workspace = do not let workers implement changes in main, master, or baseline/*; use only the assigned task/* worktree
      W4 task_create = npm run workflow:task:create -- --id <id> --slug <slug> --base baseline/origin-main
      W5 task_closeout = after human merge, run npm run workflow:task:closeout -- --branch <branch> --confirm closeout when the local task branch still exists
      W6 missing_workflow_docs = if workflow scripts or governance docs are missing in the current branch, stop and ask for direction
      W7 review_blocker = unresolved automated review comments are merge blockers
      W8 delivery_complete = not complete while upstream dependency PRs are open, downstream issues remain blocked, or worker ownership of an active PR is unclear
      W9 continuity_failure = when a worker is stuck, exits, or loses ownership continuity, inspect first and then choose restore_current_worker or successor_worker
      W10 human_escalation = escalate only for real product decisions, missing credentials, broken environment/setup, or blockers the system cannot resolve autonomously
      W11 independent_reviewer = when implementation emits ready_for_review, use a separate read-only reviewer session by convention; do not treat approved-and-green as human-ready until that review passes

      AO_TRIGGER_MATRIX
      AO_TRIGGER_MATRIX[approved-and-green] = preflight:C0+C1 | entry:C2(trigger=approved_and_green) | inspect:C3+C11 | drilldown:C4,C5 | outcome:hold_review_or_notify_human_ready_without_merge
      AO_TRIGGER_MATRIX[agent-stuck] = preflight:C0+C1 | entry:C2(trigger=agent_stuck) | inspect:C3 | drilldown:C4,C5 | outcome:continue_current_worker_or_restore_or_successor
      AO_TRIGGER_MATRIX[agent-needs-input] = preflight:C0+C1 | entry:C2(trigger=agent_needs_input) | inspect:C3 | drilldown:C4,C5 | outcome:continue_autonomy_or_human_gate
      AO_TRIGGER_MATRIX[agent-exited] = preflight:C0+C1 | entry:C2(trigger=agent_exited) | inspect:C3 | drilldown:C4,C5 | outcome:restore_worker_or_successor
    decomposer:
      enabled: false
      maxDepth: 2
      model: gpt-5-codex
      requireApproval: true

notificationRouting:
  urgent: [desktop]
  action: [desktop]
  warning: [desktop]
  info: [desktop]

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    message: "CI is failing on your PR. Run `gh pr checks` to inspect the failures, fix them, and push."
    retries: 2
    escalateAfter: 2
    escalateTo: orchestrator
  changes-requested:
    auto: true
    action: send-to-agent
    message: "There are review comments on your PR. Check `gh pr view --comments` and the inline review threads, address each comment, push fixes, and reply."
    escalateAfter: 30m
    escalateTo: orchestrator
  bugbot-comments:
    auto: true
    action: send-to-agent
    message: "Automated review comments are present on your PR, including Codex bot findings when available. Treat unresolved automated review comments as merge blockers, fix them, push, and reply where appropriate."
    escalateAfter: 30m
    escalateTo: orchestrator
  merge-conflicts:
    auto: true
    action: send-to-agent
    message: "Your branch has merge conflicts. Rebase onto `main`, resolve the conflicts, rerun the necessary checks, and push."
    escalateAfter: 15m
    escalateTo: orchestrator
  approved-and-green:
    auto: true
    action: send-to-orchestrator
    priority: action
    message: "Event=approved-and-green. Apply `AO_TRIGGER_MATRIX[approved-and-green]`."
  agent-stuck:
    auto: true
    threshold: 10m
    action: send-to-orchestrator
    message: "Event=agent-stuck. Apply `AO_TRIGGER_MATRIX[agent-stuck]`."
    priority: urgent
  agent-needs-input:
    auto: true
    action: send-to-orchestrator
    message: "Event=agent-needs-input. Apply `AO_TRIGGER_MATRIX[agent-needs-input]`."
    priority: urgent
  agent-exited:
    auto: true
    action: send-to-orchestrator
    message: "Event=agent-exited. Apply `AO_TRIGGER_MATRIX[agent-exited]`."
    priority: urgent
  agent-idle:
    auto: false
    action: notify
    priority: info
