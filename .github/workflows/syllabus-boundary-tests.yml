name: RAG Boundary Tests

on:
  pull_request:
    paths:
      - 'api/**'
      - 'scripts/rag/**'
      - 'libs/topic-path/**'
      - 'supabase/migrations/**'
      - 'tests/fixtures/**'
      - '.github/workflows/syllabus-boundary-tests.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/rag/**'
      - 'libs/topic-path/**'
      - 'supabase/migrations/**'
      - 'tests/fixtures/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary-contract:
    name: Boundary Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run current RAG boundary and route tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: >
          npx jest
          api/rag/__tests__/boundary.contract.test.js
          api/rag/__tests__/ask-service.test.js
          api/__tests__/api-route-integration.test.js
          scripts/rag/__tests__/corpus-schema-compat.test.js
          --runInBand

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "Syllabus unit tests failed. Collecting debug context..."
          node --version
          npm --version

