name: B1 Rubric Extraction Gate

on:
  pull_request:
    paths:
      - "scripts/compliance/**"
      - "scripts/ms/**"
      - "scripts/mark_scheme/**"
      - "scripts/phase1/**"
      - "tests/test_ms_*.py"
      - "supabase/migrations/*b1_rubric*"
      - ".github/workflows/b1-rubric-extraction-gate.yml"
  push:
    branches: [main]
    paths:
      - "scripts/compliance/**"
      - "scripts/ms/**"
      - "scripts/mark_scheme/**"
      - "scripts/phase1/**"
      - "tests/test_ms_*.py"
      - "supabase/migrations/*b1_rubric*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  b1-gate:
    name: B1 Gate (tests + migration + contract + qc)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest hypothesis openai psycopg2-binary python-dotenv sympy

      - name: Run B1 rubric governance audit
        run: python scripts/compliance/run_b1_rubric_governance_audit.py --seed --min-ready-rows 1

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b1-gate-artifacts
          path: |
            docs/reports/b1_rubric_qc_report.md
            runs/ms/b1_contract_failures.json
            runs/ms/b1_gate_summary.json
            runs/ms/b1_rubric_governance_summary.json
            runs/phase1/preflight_rubric_version_audit.json
          if-no-files-found: ignore

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "B1 gate failed. Collecting debug context..."
          python --version
          pip --version
          ls -la runs/ms || true
          cat runs/ms/b1_rubric_governance_summary.json || true
          ls -la docs/reports || true
