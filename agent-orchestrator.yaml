port: 3310
terminalPort: 14810
directTerminalPort: 14811
readyThresholdMs: 300000

defaults:
  runtime: tmux
  agent: codex
  workspace: worktree
  notifiers: [desktop]
  orchestrator:
    agent: codex
  worker:
    agent: codex

projects:
  ciecopilot-home:
    name: CIE Copilot Home
    repo: Samsen879/ciecopilot-home
    # Temporary bridge before governance stack is merged back to main.
    path: /home/samsen/code/ciecopilot-home/.worktrees/baseline-origin-main-20260402
    defaultBranch: main
    sessionPrefix: cie
    symlinks:
      - .env
    agentRulesFile: .agent-rules.md
    orchestratorRules: |
      Treat live GitHub PR, CI, and review state as canonical whenever AO lifecycle metadata disagrees with GitHub.
      Before acting on a stale lifecycle state, reconcile with `ao status -p ciecopilot-home --json`, `gh pr checks`, `gh pr view --json mergeable,reviewDecision,isDraft,url`, and `ao review-check ciecopilot-home --dry-run`.
      For a known PR, prefer repo-local PR-scoped reconciliation via `node scripts/ao-reconcile.js --pr <number> --json --strict` before acting on stale AO lifecycle signals.
      After reconciliation, use `node scripts/ao-doctor.js --pr <number>` or `node scripts/ao-doctor.js` when local git/worktree or AO-artifact continuity diagnosis is needed.
      After reconciliation and doctor, use `node scripts/ao-lifecycle.js --pr <number> --trigger <trigger>` when deterministic continue vs restore vs successor reasoning is needed, or when `approved_and_green` should be evaluated for explicit human notification.
      Treat repo-local doctor output as diagnose-only. It does not replace reconciliation truth and it does not grant release or repair authority.
      Treat repo-local lifecycle output as decide-only. It does not execute worker restoration, worker handoff, or merge actions.
      Use project-scoped reconciliation only for operator inspection; it is not the authoritative release gate for phase 1.
      Keep worker sessions alive after PR creation while the PR remains open so lifecycle reactions can route CI failures, human review comments, and automated review findings back to the same worker.
      Do not kill a worker session just because it has opened a PR.
      Prefer reconciling or continuing the existing worker when PR ownership is still clear.
      If the repository branch, `agent-orchestrator.yaml`, or `.agent-rules.md` changed, or AO-related stash content was restored, stop and recreate the orchestrator session instead of reusing an older one.
      Do not instruct agents to run repo-local AO control-plane scripts unless those scripts exist in the current branch.
      When repo-local workflow scripts exist, normalize local posture first with `npm run workflow:baseline:sync`.
      When repo-local workflow scripts exist, create new implementation work only through `npm run workflow:task:create -- --id <id> --slug <slug> --base baseline/origin-main-20260402`.
      Do not let workers implement changes directly in `main`, `master`, `baseline/*`, or the preserved dirty root worktree.
      Worker sessions should operate only inside their assigned `task/*` worktree once it has been created.
      After a human merges a task PR, run `npm run workflow:task:closeout -- --branch <branch> --confirm closeout` when the local task branch still exists.
      If workflow scripts or governance docs are missing in the current branch, stop and ask for direction instead of silently falling back to ad-hoc git commands.
      Treat unresolved automated review comments as merge blockers.
      Do not treat the delivery chain as complete while upstream dependency PRs are still open, downstream issues remain blocked, or worker ownership of an active PR is unclear.
      When a worker becomes stuck, exits, or loses ownership continuity, inspect first and decide whether to restore that worker or continue through a successor worker that claims the PR.
      Escalate to a human only for real product decisions, missing credentials, broken environment/setup, or other blockers the system cannot resolve autonomously.
    decomposer:
      enabled: false
      maxDepth: 2
      model: gpt-5-codex
      requireApproval: true

notificationRouting:
  urgent: [desktop]
  action: [desktop]
  warning: [desktop]
  info: [desktop]

reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    message: "CI is failing on your PR. Run `gh pr checks` to inspect the failures, fix them, and push."
    retries: 2
    escalateAfter: 2
    escalateTo: orchestrator
  changes-requested:
    auto: true
    action: send-to-agent
    message: "There are review comments on your PR. Check `gh pr view --comments` and the inline review threads, address each comment, push fixes, and reply."
    escalateAfter: 30m
    escalateTo: orchestrator
  bugbot-comments:
    auto: true
    action: send-to-agent
    message: "Automated review comments are present on your PR, including Codex bot findings when available. Treat unresolved automated review comments as merge blockers, fix them, push, and reply where appropriate."
    escalateAfter: 30m
    escalateTo: orchestrator
  merge-conflicts:
    auto: true
    action: send-to-agent
    message: "Your branch has merge conflicts. Rebase onto `main`, resolve the conflicts, rerun the necessary checks, and push."
    escalateAfter: 15m
    escalateTo: orchestrator
  approved-and-green:
    auto: true
    action: send-to-orchestrator
    priority: action
    message: "PR is approved and green. Reconcile live GitHub state with `gh pr checks`, `gh pr view --json mergeable,reviewDecision,isDraft,url`, and `ao review-check ciecopilot-home --dry-run`. Run `node scripts/ao-lifecycle.js --pr <number> --trigger approved_and_green` to classify the next step. If the PR is truly release-ready, notify the human and preserve ownership continuity. Do not merge directly."
  agent-stuck:
    auto: true
    threshold: 10m
    action: send-to-orchestrator
    message: "A worker appears stuck. Reconcile with `ao status -p ciecopilot-home --json`, inspect the worker's live PR, CI, and review state on GitHub, then run `node scripts/ao-lifecycle.js --pr <number> --trigger agent_stuck` when the PR is known to decide whether to continue the current worker, restore it, or hand off to a successor."
    priority: urgent
  agent-needs-input:
    auto: true
    action: send-to-orchestrator
    message: "A worker requested input. Reconcile AO and live GitHub state first, inspect the actual blocker, and run `node scripts/ao-lifecycle.js --pr <number> --trigger agent_needs_input` when the PR is known to classify whether autonomy can continue or whether a human gate is required."
    priority: urgent
  agent-exited:
    auto: true
    action: send-to-orchestrator
    message: "A worker exited unexpectedly. Reconcile with `ao status -p ciecopilot-home --json`, inspect the task's live PR, CI, and review state on GitHub, then run `node scripts/ao-lifecycle.js --pr <number> --trigger agent_exited` when the PR is known to decide whether to restore the worker or continue with a successor worker."
    priority: urgent
  agent-idle:
    auto: false
    action: notify
    priority: info
