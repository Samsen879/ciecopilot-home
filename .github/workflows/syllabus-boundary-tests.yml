name: RAG Boundary Tests

on:
  pull_request:
    paths:
      - 'api/**'
      - 'scripts/rag/**'
      - 'scripts/compliance/**'
      - 'scripts/db/**'
      - 'libs/topic-path/**'
      - 'supabase/migrations/**'
      - 'tests/fixtures/**'
      - '.github/workflows/syllabus-boundary-tests.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/rag/**'
      - 'scripts/compliance/**'
      - 'scripts/db/**'
      - 'libs/topic-path/**'
      - 'supabase/migrations/**'
      - 'tests/fixtures/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  boundary-contract:
    name: Boundary Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run current RAG boundary and route tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: >
          npx jest
          api/rag/__tests__/boundary.contract.test.js
          api/rag/__tests__/ask-service.test.js
          api/__tests__/api-route-integration.test.js
          scripts/rag/__tests__/corpus-schema-compat.test.js
          --runInBand

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "Syllabus unit tests failed. Collecting debug context..."
          node --version
          npm --version

  boundary-db-guardrail:
    name: Boundary DB Guardrail
    needs: boundary-contract
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cie_copilot_test
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 54322 -U postgres && break
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Setup boundary test database
        env:
          PGHOST: localhost
          PGPORT: 54322
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: cie_copilot_test
        run: |
          psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon NOLOGIN; END IF; END \$\$;"
          psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN CREATE ROLE authenticated NOLOGIN; END IF; END \$\$;"
          psql -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN CREATE ROLE service_role NOLOGIN; END IF; END \$\$;"
          psql -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -v ON_ERROR_STOP=1 -f tests/fixtures/baseline-schema.sql
          psql -v ON_ERROR_STOP=1 -f tests/fixtures/supabase-shims.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20251223000100_enable_ltree.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20251223000200_chunks_add_topic_path_fts.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20251223000300_create_curriculum_nodes.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260118093200_recreate_hybrid_search_v2.sql
          psql -v ON_ERROR_STOP=1 -f tests/fixtures/syllabus_boundary_seed.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260302190000_chunks_add_corpus_contract.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260311173000_hybrid_search_v2_add_corpus_version_filter.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260312110000_hybrid_search_v2_add_version_priority_dedupe.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260312123000_hybrid_search_v2_stable_identity_dedupe.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260312130000_hybrid_search_v2_candidate_pool_version_priority.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260312131500_hybrid_search_v2_candidate_pool_version_priority_fix.sql
          psql -v ON_ERROR_STOP=1 -f supabase/migrations/20260312143000_hybrid_search_v2_asset_family_version_shadow.sql

      - name: Run syllabus boundary preflight
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/cie_copilot_test
          PYTHONPATH: .
        run: python scripts/compliance/run_syllabus_boundary_preflight.py --db-check

      - name: Run search guardrail verification
        env:
          PGHOST: localhost
          PGPORT: 54322
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: cie_copilot_test
        run: psql -v ON_ERROR_STOP=1 -f scripts/db/verify_search_guardrail.sql

      - name: Upload boundary DB artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-boundary-db-artifacts
          path: |
            runs/compliance/syllabus_boundary_preflight.json
          if-no-files-found: ignore

