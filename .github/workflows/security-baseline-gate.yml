name: Security Baseline Gate

on:
  pull_request:
    paths:
      - "api/**"
      - "scripts/phase2/**"
      - ".github/workflows/security-baseline-gate.yml"
  push:
    branches: [main]
    paths:
      - "api/**"
      - "scripts/phase2/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-baseline:
    name: Security Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security baseline tests
        run: node --experimental-vm-modules node_modules/jest/bin/jest.js api/__tests__/security-baseline.test.js --runInBand

      - name: Run redaction scan
        run: |
          node scripts/phase2/scan_security_redaction.js
          node scripts/phase2/run_security_baseline_report.js

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-baseline-artifacts
          path: |
            runs/backend/security_redaction_scan.json
            runs/backend/security_baseline_report.json
          if-no-files-found: ignore
