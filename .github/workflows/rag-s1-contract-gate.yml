name: RAG S1 Contract Gate

on:
  pull_request:
    paths:
      - "api/rag/**"
      - "api/learning/**"
      - "src/**"
      - "scripts/rag/**"
      - "scripts/ao/**"
      - "scripts/ao-*.js"
      - "tests/ao/**"
      - ".github/workflows/ao-operations-gate.yml"
      - "docs/schemas/askai_response.schema.json"
      - ".github/workflows/rag-s1-contract-gate.yml"
  push:
    branches: [main]
    paths:
      - "api/rag/**"
      - "scripts/rag/**"
      - "docs/schemas/askai_response.schema.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rag-s1-contract:
    name: S1 Contract Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine execution scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags origin "${{ github.base_ref }}"
          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          {
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if printf '%s\n' "$changed_files" | grep -Eq '^(api/rag/|api/learning/|src/|scripts/rag/|docs/schemas/askai_response\.schema\.json$)'; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            echo "mode=noop" >> "$GITHUB_OUTPUT"
          fi

      - name: No-op for AO-only PR scope
        if: steps.scope.outputs.mode == 'noop'
        run: |
          echo "AO-only PR detected; S1 Contract Gate is not applicable to this diff."
          printf '%s\n' "${{ steps.scope.outputs.changed_files }}"

      - name: Setup Node
        if: steps.scope.outputs.mode == 'full'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.scope.outputs.mode == 'full'
        run: npm ci

      - name: Run S1 preflight
        if: steps.scope.outputs.mode == 'full'
        run: node scripts/rag/run_s1_preflight.js

      - name: Run S1 contract gate
        if: steps.scope.outputs.mode == 'full'
        run: node scripts/rag/run_s1_contract_gate.js

      - name: Run Marking isolation summary
        if: steps.scope.outputs.mode == 'full'
        run: node scripts/rag/run_marking_isolation_summary.js

      - name: Upload contract artifacts
        if: always() && steps.scope.outputs.mode == 'full'
        uses: actions/upload-artifact@v4
        with:
          name: rag-s1-contract-artifacts
          path: |
            runs/backend/rag_s1_preflight.json
            runs/backend/rag_boundary_contract_summary.json
            runs/backend/rag_s1_contract_gate_summary.json
            runs/backend/rag_marking_isolation_summary.json
          if-no-files-found: ignore
